name: Pinecone Integration Tests

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pinecone-integration:
    name: Pinecone Integration
    runs-on: ubuntu-latest
    services:
      pinecone:
        image: ghcr.io/pinecone-io/pinecone-index:latest
        env:
          PORT: 5080
          DIMENSION: 4
          METRIC: cosine
          INDEX_TYPE: approximated
        ports:
          - 5080:5080
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p traceowl-proxy --test pinecone_integration -- --include-ignored
        env:
          PINECONE_URL: http://localhost:5080
