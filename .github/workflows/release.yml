name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p traceowl-proxy -p traceowl-diff

      - name: Rename binaries
        run: |
          cp target/release/traceowl-proxy traceowl-proxy-linux-${{ matrix.arch }}
          cp target/release/traceowl-diff  traceowl-diff-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: |
            traceowl-proxy-linux-${{ matrix.arch }}
            traceowl-diff-linux-${{ matrix.arch }}

  docker:
    name: Docker (multi-platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/traceowl-proxy
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/traceowl-proxy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create release draft
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            traceowl-proxy-linux-amd64 \
            traceowl-proxy-linux-arm64 \
            traceowl-diff-linux-amd64 \
            traceowl-diff-linux-arm64
